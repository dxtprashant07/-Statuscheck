server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API proxy to the backend container. Keeps the browser talking
    # only to this origin (no CORS in the browser) and forwards /api/* upstream.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OCR + LLM passes can take minutes - give them room before timing out.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Allow the 25MB document uploads (plus a little headroom).
        client_max_body_size 30m;
    }
}
